name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyinstaller psutil pystray Pillow requests
      - name: Build EXE
        run: pyinstaller --onefile --noconsole --name DeskPets --icon=deskpets.ico --add-data "deskpets.ico;." --add-data "widgets;widgets" deskpets.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deskpets-windows
          path: dist/DeskPets.exe

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: deskpets-windows
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: DeskPets.exe
